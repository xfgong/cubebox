# Test Configuration for cubebox
# Used for E2E testing with real API calls

dynaconf_merge: true
test:
  env: test
  
  debug: true
  
  # API Configuration
  api:
    host: "127.0.0.1"
    port: 8001
    reload: false
  
  # Sandbox Configuration for Testing
  sandbox:
    enabled: true  # Disable sandbox in tests by default
    domain: "localhost:8090"
    image: "hub.sensedeal.vip/library/ubuntu:22.04"
