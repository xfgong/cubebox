# Base Configuration for cubebox

debug: false

# LLM Configuration
llm:
  provider: openai
  model: gpt-4
  temperature: 0.7

# Sandbox Configuration
sandbox:
  timeout: 30
  memory_limit: 512
  cpu_limit: 1.0
  network_enabled: false

# Memory Configuration
memory:
  short_term_enabled: true
  long_term_enabled: false

# MCP Configuration
mcp:
  enabled: false
  servers: []

# API Configuration
api:
  host: "0.0.0.0"
  port: 8000
  reload: true
