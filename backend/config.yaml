# Base Configuration for cubebox
default: 
  env: default
  debug: false
  
  # API Configuration
  api:
    host: "0.0.0.0"
    port: 8000
    reload: true
  
  # LLM Configuration
  # Note: For reasoning models, set reasoning config to enable reasoning output
  # Example: reasoning: {effort: "medium", summary: "auto"}
  llm:
    # Model Providers Configuration
    providers:
      cubebox:
        baseUrl: "USE ENV"
        apiKey: "USE ENV"
        api: "openai-completions"
        extra_body: {}
        extra_headers: {}
        models:
          - id: "doubao-seed-1.8"
            name: "DouBao Seed 1.8"
            reasoning: false
            input: ["text", "image"]
            cost:
              input: 2.4
              output: 24
              cacheRead: 0
              cacheWrite: 0
            contextWindow: 256000
            maxTokens: 64000
            extra_body: {}
            extra_headers: {}
          - id: "qwen3-max-2026-01-23"
            name: "Qwen3 Max 0123"
            reasoning: false
            input: ["text"]
            cost:
              input: 7
              output: 28
              cacheRead: 0
              cacheWrite: 0
            contextWindow: 256000
            maxTokens: 32000
            extra_body: {}
            extra_headers: {}
  
  # Sandbox Configuration
  sandbox:
    timeout: 30
    memory_limit: 512
    cpu_limit: 1.0
    network_enabled: false
  
  # Memory Configuration
  memory:
    short_term_enabled: true
    long_term_enabled: false
  
  # MCP Configuration
  mcp:
    enabled: false
    servers: []
  